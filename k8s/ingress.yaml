apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: repl
  namespace: repl
  annotations:
    # Adjust for your ingress controller (nginx assumed here).
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: repl.habeebsaleh.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: repl
                port:
                  number: 80
  # tls:
  #   - hosts:
  #       - repl.habeebsaleh.dev
  #     secretName: repl-tls
