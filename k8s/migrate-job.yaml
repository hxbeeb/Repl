apiVersion: batch/v1
kind: Job
metadata:
  # Name is suffixed with the build tag by the pipeline so each release
  # gets a fresh, immutable Job (Jobs are not updatable in place).
  name: repl-migrate
  namespace: repl
  labels:
    app: repl
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: repl
        job: migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: migrate
          image: IMAGE_PLACEHOLDER
          # Invoke the prisma CLI by its entrypoint directly — the standalone
          # runtime image doesn't expose the node_modules/.bin/prisma symlink
          # that `npx prisma` relies on.
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          workingDir: /app
          envFrom:
            - secretRef:
                name: repl-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
