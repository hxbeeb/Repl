apiVersion: v1
kind: Service
metadata:
  name: repl
  namespace: repl
  labels:
    app: repl
spec:
  # NodePort on 80 so the app is reachable directly at http://<EC2_IP>
  # (IP-only access; Traefik disabled in k3s, NodePort range widened to 80).
  type: NodePort
  selector:
    app: repl
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 80
