apiVersion: v1
kind: Service
metadata:
  name: repl
  namespace: repl
  labels:
    app: repl
spec:
  # NodePort so the app is reachable directly at http://<EC2_IP>:30080
  # (IP-only access, no domain/ingress needed).
  type: NodePort
  selector:
    app: repl
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
