apiVersion: apps/v1
kind: Deployment
metadata:
  name: repl
  namespace: repl
  labels:
    app: repl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: repl
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: repl
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: web
          # IMAGE_TAG is substituted by the Jenkins pipeline at deploy time.
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: repl-secrets
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health?ready=1
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
